name: browser
on:
  workflow_dispatch:
    inputs:
      cmd_b64:
        type: string
        required: true
      session:
        type: string
        default: default
jobs:
  exec:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq chromium-browser 2>/dev/null || sudo apt-get install -y -qq chromium 2>/dev/null || true
          for B in google-chrome google-chrome-stable chromium chromium-browser; do
            P=$(which $B 2>/dev/null || true)
            if [ -n "$P" ]; then
              [ "$P" != "/usr/bin/chromium" ] && sudo ln -sf "$P" /usr/bin/chromium
              break
            fi
          done
          pip install -q websocket-client
      - uses: actions/cache@v4
        with:
          path: /tmp/browser-local-data
          key: browser-profile-${{ inputs.session }}
      - run: |
          set +e
          chmod +x browser-local
          CMD=$(echo "${{ inputs.cmd_b64 }}" | base64 -d)
          python3 browser-local --session "${{ inputs.session }}" start --port=9222 &
          SPID=$!
          CDP=""
          for i in $(seq 1 20); do
            CDP=$(python3 -c "import json; print(json.load(open('/tmp/browser-local.pid'))['cdp_url'])" 2>/dev/null || echo "")
            [ -n "$CDP" ] && break
            CDP=$(python3 -c "import json,urllib.request; print(json.loads(urllib.request.urlopen('http://127.0.0.1:9222/json/version').read()).get('webSocketDebuggerUrl',''))" 2>/dev/null || echo "")
            [ -n "$CDP" ] && break
            sleep 2
          done
          if [ -z "$CDP" ]; then echo "FAIL: CDP not found"; exit 1; fi
          python3 browser-local --cdp-url "$CDP" --session "${{ inputs.session }}" $CMD 2>&1 || true
          kill $SPID 2>/dev/null || true
          pkill -f remote-debugging 2>/dev/null || true
      - if: always()
        uses: actions/cache/save@v4
        with:
          path: /tmp/browser-local-data
          key: browser-profile-${{ inputs.session }}
