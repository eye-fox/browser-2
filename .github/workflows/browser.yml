name: browser
on:
  workflow_dispatch:
    inputs:
      cmd_b64:
        description: 'Base64-encoded full browser-local command'
        required: true
        type: string
      session:
        description: 'Session name'
        default: 'default'
        type: string

concurrency:
  group: browser-session-${{ inputs.session }}
  cancel-in-progress: true

jobs:
  execute:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install Chromium
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq chromium 2>/dev/null || \
          sudo apt-get install -y -qq chromium-browser 2>/dev/null || \
          (sudo snap install chromium 2>/dev/null) || true
          echo "CHROME=$(which chromium chromium-browser 2>/dev/null | head -1 || echo '/usr/bin/chromium')" >> $GITHUB_ENV

      - name: Install Python deps
        run: pip install -q websocket-client

      - name: Restore profile cache
        id: cache-profile
        uses: actions/cache@v4
        with:
          path: /tmp/browser-local-data
          key: browser-profile-${{ inputs.session }}
          restore-keys: |
            browser-profile-${{ inputs.session }}
            browser-profile-default

      - name: Execute
        run: |
          chmod +x $GITHUB_WORKSPACE/browser-local
          CMD=$(echo "${{ inputs.cmd_b64 }}" | base64 -d 2>/dev/null || echo "${{ inputs.cmd_b64 }}")
          SESSION="${{ inputs.session }}"

          # Start browser in background
          python3 $GITHUB_WORKSPACE/browser-local --session "$SESSION" start --port=9222 &
          START_PID=$!
          sleep 3

          # Get CDP URL
          CDP_URL=""
          for i in 1 2 3 4 5; do
            if [ -f /tmp/browser-local.pid ]; then
              CDP_URL=$(python3 -c "import json; print(json.load(open('/tmp/browser-local.pid'))['cdp_url'])" 2>/dev/null)
              [ -n "$CDP_URL" ] && break
            fi
            sleep 1
          done

          if [ -z "$CDP_URL" ]; then
            # Fallback: try to discover from port
            CDP_URL=$(python3 -c "
import json, urllib.request
try:
    d = json.loads(urllib.request.urlopen('http://127.0.0.1:9222/json/version').read())
    print(d.get('webSocketDebuggerUrl',''))
except: print('')
" 2>/dev/null)
          fi

          if [ -z "$CDP_URL" ]; then
            echo "ERROR: Could not start Chromium / find CDP port"
            pkill -f "remote-debugging" 2>/dev/null || true
            exit 1
          fi

          echo "CDP_URL=$CDP_URL"
          echo "CMD=$CMD"

          # Execute the command via browser-local
          python3 $GITHUB_WORKSPACE/browser-local --cdp-url "$CDP_URL" --session "$SESSION" $CMD 2>&1 || true

          # Kill browser
          kill $START_PID 2>/dev/null || true
          pkill -f "remote-debugging" 2>/dev/null || true

      - name: Save profile cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: /tmp/browser-local-data
          key: browser-profile-${{ inputs.session }}
